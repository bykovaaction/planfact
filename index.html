<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>План / Факт отклонение</title>
  <style>
    :root {
      --bg:       #ffffff;
      --surface:  #ffffff;
      --panel:    #ffffff;
      --border:   #e2e8f0;
      --border2:  #d6deea;
      --text:     #111827;
      --muted:    #64748b;
      --dim:      #94a3b8;
      --gold:     #111827;
      --gold-dim: #111827;
      --green:    #3dba82;
      --red:      #e05252;
      --green-dim:#e8f8f0;
      --red-dim:  #fdecec;
      --demo-text: #7f8da3;
      --demo-muted: #8d99ab;
      --demo-green: #87b79d;
      --demo-red: #cc9a9a;
      --demo-green-dim: #eef7f2;
      --demo-red-dim: #f9eeee;
      --font-main: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
      --mono: var(--font-main);
      --serif: var(--font-main);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 757px;
    }
    
    html, body, input, button, textarea, select, svg text {
  font-family: var(--font-main) !important;
}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      padding: 0;
      position: relative;
      overflow-x: hidden;
    }

    .panel-head,
 .field label,
 .kpi-label,
 .bd-cell-label,
 .chart-axis-labels,
 .btn {
  text-transform: none !important;
  letter-spacing: normal !important;
}

    body::before { display: none; }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 20px 56px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 0;
      border-bottom: 0;
    }

    .header-left {
  width: 100%;
}

    h1 {
  font-size: clamp(28px, 3.2vw, 40px);
  line-height: 1.08;
  font-weight: 620;
  letter-spacing: -0.03em;
  color: var(--text);
  max-width: none;
  width: 100%;
  margin-bottom: 10px;
}
.header-subtitle {
  margin-top: 0;
  font-size: 17px;
  line-height: 1.45;
  color: #5f6f88;
  max-width: 95%;
  width: 100%;
}


    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── Panel base ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
    }

    .panel::before { display: none; }

    .panel-head {
      padding: 14px 18px 10px;
      font-size: 17px;
      line-height: 1.3;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: #5f6f88;
      border-bottom: 0;
    }

    /* ── Input panel ── */
    .input-fields {
      padding: 18px 18px 20px;
      background: rgba(111, 67, 137, 0.12);
    }

    .input-actions {
      padding: 20px 18px 18px;
      background: #ffffff;
      border-top: 0;
    }

    .input-actions .btn:first-child {
      margin-top: 0;
    }

    .input-panel-head {
      font-weight: 700;
      border: 0;
      background: #ffffff;
    }

    .field { margin-bottom: 16px; }
    .field:last-of-type { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 17px;
      line-height: 1.3;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: #5f6f88;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      height: 44px;
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius-md);
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 500;
      color: #334155;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder { color: #8f9cb0; font-weight: 400; }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    .btn {
      width: 100%;
      height: 44px;
      margin-top: 20px;
      background: #6f4389;
      border: 1px solid #6f4389;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 17px;
      line-height: 1.3;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ffffff;
      cursor: pointer;
      transition: none;
    }

    .btn-secondary {
      margin-top: 16px;
      background: #f8f9fc;
      color: #8a95a8;
      border: 1px solid #e3e8f2;
      font-weight: 560;
    }

    .btn.btn-secondary:hover {
      background: #f1f4fa;
      color: #7d899d;
    }

    .btn::before { display: none; }
    .btn span { position: static; z-index: auto; }
    .btn:hover { background: #6f4389; color: #ffffff; }
    .btn:active { opacity: 1; }

    .error-msg {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: var(--red);
      letter-spacing: 0.01em;
    }

    /* ── Right column ── */
    .right-col {
      display: grid;
      gap: 20px;
    }

    /* ── KPI strip ── */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .kpi-strip::before { display: none; }

    .kpi {
      background: var(--surface);
      padding: 16px 18px 18px;
      position: relative;
    }

    .kpi-label {
      font-size: 17px;
      line-height: 1.3;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: #5f6f88;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-family: var(--mono);
      font-size: 1.55rem;
      font-weight: 500;
      line-height: 1;
      color: var(--dim);
      transition: color 0.3s;
      letter-spacing: -0.02em;
    }

    .kpi-value.populated { color: var(--text); }
    .kpi-value.positive  { color: var(--green); }
    .kpi-value.negative  { color: var(--red); }

    .kpi-sub {
      font-size: 13px;
      color: #73839b;
      margin-top: 6px;
      min-height: 14px;
      transition: color 0.3s;
    }

    /* ── Verdict banner ── */
    .verdict {
      padding: 16px 20px;
      display: none;
      align-items: center;
      gap: 14px;
      border: 1px solid #e5ebf3;
      border-radius: var(--radius-lg);
      background: var(--surface);
      animation: fadeUp 0.25s ease;
    }

    .verdict.show { display: flex; }

    .verdict-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .verdict-icon.pos { background: var(--green-dim); color: var(--green); }
    .verdict-icon.neg { background: var(--red-dim);   color: var(--red);   }
    .verdict-icon.neu { background: var(--panel);      color: var(--muted); }

    .verdict-text {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.35;
      color: var(--text);
    }

    .verdict-text strong {
      font-style: normal;
      font-weight: 700;
    }

    /* ── Breakdown ── */
    .breakdown {
      display: none;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
    }

    .breakdown.show { display: grid; grid-template-columns: 1fr 1fr; }
    .breakdown::before { display: none; }

    .bd-cell {
      background: var(--surface);
      padding: 14px 18px 16px;
    }

    .bd-cell-label {
      font-size: 13px;
      letter-spacing: normal;
      text-transform: none;
      color: #73839b;
      margin-bottom: 6px;
    }

    .bd-cell-value {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
    }

    .bd-cell-value.pos { color: var(--green); }
    .bd-cell-value.neg { color: var(--red); }

    /* ── Chart panel ── */
    .chart-panel {
      grid-column: 1 / -1;
    }

    .chart-body {
      padding: 16px 12px 10px;
    }

    .chart-svg-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 2px;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .chart-svg-wrap svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── Axis labels ── */
    .chart-axis-labels {
      position: relative;
      height: 24px;
      padding: 8px 0 4px;
      font-size: 0.68rem;
      color: #73839b;
      letter-spacing: normal;
      text-transform: none;
    }

    .chart-axis-labels span {
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .chart-axis-labels span:first-child { left: 27.2%; }
    .chart-axis-labels span:last-child  { left: 58.1%; }

    /* ── Demo result state ── */
    .right-col.demo-mode .panel-head,
    .right-col.demo-mode .kpi-label,
    .right-col.demo-mode .kpi-sub,
    .right-col.demo-mode .bd-cell-label,
    .right-col.demo-mode .chart-axis-labels {
      color: var(--demo-muted);
    }

    .right-col.demo-mode .kpi-value.populated { color: var(--demo-text); }
    .right-col.demo-mode .kpi-value.positive  { color: var(--demo-green); }
    .right-col.demo-mode .kpi-value.negative  { color: var(--demo-red); }
    .right-col.demo-mode .bd-cell-value.pos   { color: var(--demo-green); }
    .right-col.demo-mode .bd-cell-value.neg   { color: var(--demo-red); }
    .right-col.demo-mode .verdict-text        { color: var(--demo-text); }
    .right-col.demo-mode .verdict-icon.pos    { background: var(--demo-green-dim); color: var(--demo-green); }
    .right-col.demo-mode .verdict-icon.neg    { background: var(--demo-red-dim); color: var(--demo-red); }
    .right-col.demo-mode .verdict-icon.neu    { color: var(--demo-muted); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes countUp {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .shell { padding: 28px 16px 48px; }
      header { flex-direction: column; gap: 12px; }
      .layout { grid-template-columns: 1fr; }
      .kpi-strip { grid-template-columns: 1fr; }
      .breakdown.show { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="header-left">
      <h1>Интерактивный калькулятор:<br>план-факт по прибыли и убытку</h1>
      <p class="header-subtitle">Введите свои данные и получите расчет отклонений с подробной интерпретацией и визуализацией</p>
    </div>
  </header>

  <div class="layout">

    <!-- Left: inputs -->
    <aside>
      <div class="panel">
        <div class="panel-head input-panel-head">Введите исходные данные</div>
        <div class="input-fields">
          <div class="field">
            <label for="plan">План</label>
            <div class="input-wrap">
              <input id="plan" type="text" inputmode="decimal" placeholder="-100" autocomplete="off">
            </div>
          </div>
          <div class="field">
            <label for="fact">Факт</label>
            <div class="input-wrap">
              <input id="fact" type="text" inputmode="decimal" placeholder="50" autocomplete="off">
            </div>
          </div>
        </div>
        <div class="input-actions">
          <button class="btn" id="calcBtn" type="button"><span>Рассчитать отклонение</span></button>
          <button class="btn btn-secondary" id="clearBtn" type="button"><span>Очистить</span></button>
          <div class="error-msg" id="error"></div>
        </div>
      </div>
    </aside>

    <!-- Right: output -->
    <div class="right-col" id="rightCol">

      <!-- KPI strip -->
      <div class="kpi-strip panel">
        <div class="kpi">
          <div class="kpi-label">План</div>
          <div class="kpi-value" id="kpiPlan">—</div>
          <div class="kpi-sub" id="kpiPlanSub"></div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Факт</div>
          <div class="kpi-value" id="kpiFact">—</div>
          <div class="kpi-sub" id="kpiFactSub"></div>
        </div>
        <div class="kpi">
  <div class="kpi-label">Отклонение</div>
  <div class="kpi-value" id="kpiDev">—</div>
  <div class="kpi-sub" id="kpiDevSub"></div>
  <div class="kpi-sub" id="kpiMethod"></div>
</div>
      </div>

      <!-- Verdict -->
      <div class="verdict" id="verdict">
        <div class="verdict-icon" id="verdictIcon">→</div>
        <div class="verdict-text" id="verdictText"></div>
      </div>

     <!-- Breakdown (cross-zero) -->
<div class="panel" id="breakdownPanel" style="display:none;">
  <div class="panel-head">Структура изменения</div>
  <div class="breakdown" id="breakdown">
        <div class="bd-cell">
          <div class="bd-cell-label" id="bd1Label"></div>
          <div class="bd-cell-value" id="bd1Value"></div>
        </div>
        <div class="bd-cell">
          <div class="bd-cell-label" id="bd2Label"></div>
          <div class="bd-cell-value" id="bd2Value"></div>
        </div>
        </div>
    </div>

    </div><!-- /right-col -->
    <!-- Chart -->
    <div class="panel chart-panel">
      <div class="panel-head">Диаграмма план / факт</div>
      <div class="chart-body">
        <div class="chart-svg-wrap">
          <svg id="chartSvg" viewBox="0 0 680 280" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="mNeutral" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L7,3 z" fill="#0f172a"/>
              </marker>
              <marker id="mPos" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L7,3 z" fill="#3dba82"/>
              </marker>
              <marker id="mNeg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L7,3 z" fill="#e05252"/>
              </marker>
            </defs>

            <!-- axes -->
            <line id="yAxis" x1="60" y1="260" x2="60" y2="12" stroke="#3a3f52" stroke-width="1" marker-end="url(#mNeutral)"/>
            <line id="xAxis" x1="60" y1="140" x2="650" y2="140" stroke="#3a3f52" stroke-width="1" marker-end="url(#mNeutral)"/>
            <text id="lblZero" x="46" y="144" text-anchor="end" font-family="Intel One Mono, Segoe UI, sans-serif" font-size="11" fill="#64748b">0</text>

            <!-- guide lines -->
            <g id="guides"></g>

            <!-- bars -->
            <rect id="barPlan" x="150" y="140" width="70" height="0" fill="#94a3b8" rx="1"/>
            <rect id="barFact" x="360" y="140" width="70" height="0" fill="#94a3b8" rx="1"/>

            <!-- bar labels -->
            

            <text id="lblPlanVal" x="185" y="30" text-anchor="middle" font-family="Intel One Mono, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#111827"/>
            <text id="lblFactVal" x="395" y="30" text-anchor="middle" font-family="Intel One Mono, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#111827"/>

            <!-- arrow -->
            <path id="arrow" d="" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="3 6" marker-end="url(#mNeutral)"/>
            <text id="arrowLabel" x="490" y="130" font-family="Intel One Mono, Segoe UI, sans-serif" font-size="22" font-weight="500" fill="#111827" text-anchor="start"/>
          </svg>
        </div>
        <div class="chart-axis-labels">
          <span>План</span>
          <span>Факт</span>
        </div>
      </div>
    </div>
  </div><!-- /layout -->
</div><!-- /shell -->

<script>
  const $ = id => document.getElementById(id);

  // DOM refs
  const planInput  = $("plan");
  const factInput  = $("fact");
  const calcBtn    = $("calcBtn");
  const clearBtn   = $("clearBtn");
  const errorEl    = $("error");
  const kpiPlan    = $("kpiPlan");
  const kpiFact    = $("kpiFact");
  const kpiDev     = $("kpiDev");
  const kpiPlanSub = $("kpiPlanSub");
  const kpiFactSub = $("kpiFactSub");
const kpiDevSub  = $("kpiDevSub");
const kpiMethod  = $("kpiMethod");
const rightCol   = $("rightCol");
const verdict    = $("verdict");
  const verdictIcon= $("verdictIcon");
  const verdictText= $("verdictText");
  const breakdownPanel = $("breakdownPanel");
const breakdown  = $("breakdown");
const bd1Label   = $("bd1Label");
  const bd1Value   = $("bd1Value");
  const bd2Label   = $("bd2Label");
  const bd2Value   = $("bd2Value");

  // SVG refs
  const yAxis      = $("yAxis");
  const xAxis      = $("xAxis");
  const lblZero    = $("lblZero");
  const guides     = $("guides");
  const barPlan    = $("barPlan");
  const barFact    = $("barFact");
  const lblPlanVal = $("lblPlanVal");
  const lblFactVal = $("lblFactVal");
  const arrowEl    = $("arrow");
  const arrowLabel = $("arrowLabel");

  // ─── Helpers ──────────────────────────────────────────────
  const sanitize = v => v.replace(/\s+/g, "").replace(",", ".");
  const toNum    = v => { if (!v) return null; const n = Number(v); return isFinite(n) ? n : null; };
  const fmtV     = v => Number.isInteger(v) ? String(v) : v.toFixed(2).replace(/\.?0+$/, "");
  const fmtPct   = n => { const r = Math.round(n); return (r > 0 ? "+" : "") + r + "%"; };
  const clamp    = (n, a, b) => Math.max(a, Math.min(b, n));

  function svgEl(tag, attrs) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    return el;
  }

  // ─── Interpretation ───────────────────────────────────────
  function getVerdict(plan, fact) {
    if (plan === 0) {
      if (fact === 0) return { cls: "neu", icon: "→", text: "Факт соответствует плану" };
      if (fact > 0)  return { cls: "pos", icon: "↑", text: "При нулевом плане компания получила прибыль" };
      return { cls: "neg", icon: "↓", text: "При нулевом плане компания получила убыток" };
    }
    if (plan > 0 && fact > 0) {
      const pct = Math.round(((fact - plan) / plan) * 100);
      if (fact > plan) return { cls: "pos", icon: "↑", text: `Факт выше плана на <strong>${fmtPct(pct)}</strong>` };
      if (fact < plan) return { cls: "neg", icon: "↓", text: `Факт ниже плана на <strong>${Math.abs(pct)}%</strong>` };
      return { cls: "neu", icon: "→", text: "Факт соответствует плану" };
    }
    if (plan < 0 && fact < 0) {
      const pct = Math.round(((fact - plan) / Math.abs(plan)) * 100);
      if (fact > plan) return { cls: "pos", icon: "↑", text: `Фактический убыток ниже планового на <strong>${Math.abs(pct)}%</strong>` };
      if (fact < plan) return { cls: "neg", icon: "↓", text: `Фактический убыток выше планового на <strong>${fmtPct(Math.abs(pct))}</strong>` };
      return { cls: "neu", icon: "→", text: "Фактический убыток соответствует плановому" };
    }
    if (plan < 0 && fact > 0) return { cls: "pos", icon: "↑", text: "Компания вышла из убытка в прибыль" };
    if (plan > 0 && fact < 0) return { cls: "neg", icon: "↓", text: "Компания перешла от прибыли к убытку" };
    return { cls: "neu", icon: "→", text: "Нет изменений" };
  }

  // ─── Chart ────────────────────────────────────────────────
  function renderChart(plan, fact, annotate, demo = false) {
    const W = 680, H = 280;
    const xL = 60, xR = 640, yT = 18, yB = 260;
    const xPlanC = 185, xFactC = 395, bW = 70;

    const vals    = [0, plan, fact];
    const dMin    = Math.min(...vals), dMax = Math.max(...vals);
    const range   = Math.max(1, dMax - dMin);
    const pad     = range * 0.20;
    const vMin    = dMin - pad, vMax = dMax + pad;
    const plotH   = yB - yT;
    const mapY    = v => yT + ((vMax - v) / (vMax - vMin)) * plotH;
    const zeroY   = mapY(0);
    const planY   = mapY(plan);
    const factY   = mapY(fact);

    // axes
    yAxis.setAttribute("y1", yB); yAxis.setAttribute("y2", yT);
    xAxis.setAttribute("y1", zeroY); xAxis.setAttribute("y2", zeroY);
    lblZero.setAttribute("y", clamp(zeroY + 4, yT + 12, yB - 6));

    // guides
    guides.innerHTML = "";
    [plan, fact].filter((v,i,a) => a.indexOf(v) === i && v !== 0).forEach(v => {
      const gy = mapY(v);
      guides.appendChild(svgEl("line", {
        x1: xL, y1: gy.toFixed(1), x2: xR, y2: gy.toFixed(1),
        stroke: "#d7dee8", "stroke-width": 1, "stroke-dasharray": "4 5"
      }));
      const t = svgEl("text", {
        x: 46, y: clamp(gy + 4, yT + 12, yB - 5),
        "text-anchor": "end", "font-size": 11, fill: "#9aa8ba",
        "font-family": "Intel One Mono, Segoe UI, sans-serif"
      });
      t.textContent = fmtV(v);
      guides.appendChild(t);
    });

    // bars
    function setBar(el, val, cx) {
      const y = mapY(val);
      const top = Math.min(zeroY, y);
      const h   = Math.max(0, Math.abs(zeroY - y));
      el.setAttribute("x", cx - bW / 2);
      el.setAttribute("y", top.toFixed(1));
      el.setAttribute("height", h.toFixed(1));
      if (val > 0) {
        el.setAttribute("fill", demo ? "#bfd6c8" : "#9fdac0");
      } else if (val < 0) {
        el.setAttribute("fill", demo ? "#e2c3c3" : "#f2b0b0");
      } else {
        el.setAttribute("fill", demo ? "#b5c0d0" : "#94a3b8");
      }
    }

    setBar(barPlan, plan, xPlanC);
    setBar(barFact, fact, xFactC);

    // name labels
   

    // value labels
    const planValY = clamp(planY + (plan >= 0 ? -10 : 18), yT + 14, yB - 5);
    const factValY = clamp(factY + (fact >= 0 ? -10 : 18), yT + 14, yB - 5);
    lblPlanVal.setAttribute("x", xPlanC); lblPlanVal.setAttribute("y", planValY);
    lblFactVal.setAttribute("x", xFactC); lblFactVal.setAttribute("y", factValY);
    lblPlanVal.textContent = annotate ? fmtV(plan) : "";
    lblFactVal.textContent = annotate ? fmtV(fact) : "";

    // arrow
    if (!annotate || plan === 0) {
      arrowEl.setAttribute("d", ""); arrowLabel.textContent = ""; return;
    }

    const midX = (xPlanC + xFactC) / 2;
    const dy   = factY - planY;
    const cpY  = dy < 0 ? Math.max(planY, factY) + 40 : Math.min(planY, factY) - 40;
    arrowEl.setAttribute("d", `M ${xPlanC} ${planY.toFixed(1)} Q ${midX} ${cpY.toFixed(1)} ${xFactC} ${factY.toFixed(1)}`);

    const dev = ((fact - plan) / Math.abs(plan)) * 100;
    const devRnd = Math.round(dev);
    const color  = devRnd > 0
      ? (demo ? "#87b79d" : "#3dba82")
      : devRnd < 0
        ? (demo ? "#cc9a9a" : "#e05252")
        : (demo ? "#8d99ab" : "#64748b");

    arrowEl.setAttribute("stroke", "#334155");
    arrowEl.setAttribute("stroke-width", "1.2");
    arrowEl.setAttribute("stroke-dasharray", "3 6");
    arrowEl.setAttribute("marker-end", "url(#mNeutral)");
    arrowEl.setAttribute("stroke-linecap", "round");

    const labelX = xFactC + 46;
    const labelY2 = clamp((planY + factY) / 2, yT + 18, yB - 16);

    arrowLabel.setAttribute("x", labelX);
    arrowLabel.setAttribute("y", labelY2);
    arrowLabel.setAttribute("fill", color);
    arrowLabel.textContent = fmtPct(dev);
  
  }

  // ─── Render result ────────────────────────────────────────
  function renderResult(plan, fact, options = {}) {
    const { demo = false } = options;
    rightCol.classList.toggle("demo-mode", demo);
    errorEl.textContent = "";

    // KPI: plan
    kpiPlan.textContent = fmtV(plan);
    kpiPlan.className = "kpi-value populated";
    kpiPlanSub.textContent = plan > 0 ? "прибыль" : plan < 0 ? "убыток" : "ноль";

    // KPI: fact
    kpiFact.textContent = fmtV(fact);
    kpiFact.className = "kpi-value populated";
    kpiFactSub.textContent = fact > 0 ? "прибыль" : fact < 0 ? "убыток" : "ноль";

    // KPI: deviation
   if (plan === 0) {
  kpiDev.textContent = "n/a";
  kpiDev.className = "kpi-value";
  kpiDevSub.textContent = "процент не рассчитывается";
  kpiMethod.textContent = "План = 0";
} else {
  const dev = ((fact - plan) / Math.abs(plan)) * 100;
  const devRnd = Math.round(dev);
  const crossZero = (plan < 0 && fact > 0) || (plan > 0 && fact < 0);

  kpiDev.textContent = fmtPct(dev);
  kpiDev.className = "kpi-value " + (devRnd > 0 ? "positive" : devRnd < 0 ? "negative" : "populated");
  kpiDevSub.textContent = fact - plan >= 0
    ? `+${fmtV(fact - plan)} абс.`
    : `${fmtV(fact - plan)} абс.`;

  if (crossZero) {
    kpiMethod.textContent = "Переход через ноль: нужна отдельная интерпретация";
  } else if (plan < 0) {
    kpiMethod.textContent = "Расчет через модуль планового значения";
  } else {
    kpiMethod.textContent = "Стандартная формула";
  }
}

    // Verdict
    const v = getVerdict(plan, fact);
    verdict.className = "verdict show";
    verdictIcon.className = "verdict-icon " + v.cls;
    verdictIcon.textContent = v.icon;
    verdictText.innerHTML = v.text;

    // Cross-zero breakdown
    const crossZero = (plan < 0 && fact > 0) || (plan > 0 && fact < 0);
    if (crossZero && plan !== 0) {
      breakdownPanel.style.display = "block";
breakdown.className = "breakdown show";
      const extra = Math.round((Math.abs(fact) / Math.abs(plan)) * 100);
      if (plan < 0 && fact > 0) {
        bd1Label.textContent = "Закрыли убыток";
        bd1Value.textContent = "100%";
        bd1Value.className = "bd-cell-value pos";
        bd2Label.textContent = "После покрытия убытка получили прибыль";
        bd2Value.textContent = `+${extra}%`;
        bd2Value.className = "bd-cell-value pos";
      } else {
        bd1Label.textContent = "Потеряли плановую прибыль";
        bd1Value.textContent = "−100%";
        bd1Value.className = "bd-cell-value neg";
        bd2Label.textContent = "Ушли в убыток";
        bd2Value.textContent = `−${extra}%`;
        bd2Value.className = "bd-cell-value neg";
      }
    } else {
      breakdownPanel.style.display = "none";
breakdown.className = "breakdown";
    }

    renderChart(plan, fact, true, demo);
  }

  function renderDemoState() {
    renderResult(-100, 50, { demo: true });
  }

  // ─── Input handling ────────────────────────────────────────
  function parseInputs() {
    const pr = sanitize(planInput.value);
    const fr = sanitize(factInput.value);
    planInput.value = pr; factInput.value = fr;
    return { plan: toNum(pr), fact: toNum(fr), pr, fr };
  }

  calcBtn.addEventListener("click", () => {
  const { plan, fact, pr, fr } = parseInputs();

  if (!pr || !fr) {
    errorEl.textContent = "Введите план и факт.";
    kpiMethod.textContent = "";
    return;
  }

  if (plan === null || fact === null) {
    errorEl.textContent = "Используйте числовые значения.";
    kpiMethod.textContent = "";
    return;
  }

  renderResult(plan, fact, { demo: false });
});

  clearBtn.addEventListener("click", () => {
    planInput.value = "";
    factInput.value = "";
    errorEl.textContent = "";
    renderDemoState();
    planInput.focus();
  });

  [planInput, factInput].forEach(inp => {
    inp.addEventListener("input", () => {
      const { plan, fact, pr, fr } = parseInputs();
      errorEl.textContent = "";
      if (!pr && !fr) { renderDemoState(); return; }
      rightCol.classList.remove("demo-mode");
      verdict.className = "verdict";
      breakdownPanel.style.display = "none";
breakdown.className = "breakdown";
      kpiPlan.textContent = "—";
      kpiFact.textContent = "—";
      kpiDev.textContent = "—";
      kpiPlan.className = "kpi-value";
      kpiFact.className = "kpi-value";
      kpiDev.className = "kpi-value";
      kpiPlanSub.textContent = "";
      kpiFactSub.textContent = "";
      kpiDevSub.textContent = "";
      kpiMethod.textContent = "";
      const planPreview = (pr && plan !== null) ? plan : 0;
      const factPreview = (fr && fact !== null) ? fact : 0;
      renderChart(planPreview, factPreview, false, false);
    });
  });

  // initial demo state
  renderDemoState();
</script>
</body>
</html>
